<svg width="840" height="200" viewBox="0 0 840 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#1e2030"/>
    </linearGradient>
    <linearGradient id="canopy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#98c379"/>
      <stop offset="100%" stop-color="#7cb668"/>
    </linearGradient>
    <linearGradient id="canopy2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7cb668"/>
      <stop offset="100%" stop-color="#5fa050"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="200" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="66" x2="840" y2="66" stroke="#282c34" stroke-width="0.5"/>
  <line x1="0" y1="133" x2="840" y2="133" stroke="#282c34" stroke-width="0.5"/>

  <!-- Tree -->
  <g transform="translate(135, 22)">
    <!-- Trunk -->
    <rect x="42" y="105" width="14" height="50" rx="4" fill="#e5c07b" opacity="0.9"/>
    <!-- Root lines -->
    <line x1="42" y1="148" x2="28" y2="160" stroke="#e5c07b" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="56" y1="148" x2="70" y2="158" stroke="#e5c07b" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <!-- Main canopy -->
    <ellipse cx="49" cy="65" rx="48" ry="52" fill="url(#canopy)" opacity="0.85"/>
    <!-- Depth layers -->
    <ellipse cx="35" cy="55" rx="30" ry="35" fill="url(#canopy2)" opacity="0.5"/>
    <ellipse cx="65" cy="70" rx="28" ry="30" fill="#98c379" opacity="0.4"/>
    <!-- Highlight -->
    <ellipse cx="40" cy="42" rx="18" ry="20" fill="#a8d88a" opacity="0.3"/>
    <!-- Small branch dots (like worktree nodes) -->
    <circle cx="20" cy="48" r="4" fill="#61afef" opacity="0.7"/>
    <circle cx="72" cy="58" r="4" fill="#61afef" opacity="0.7"/>
    <circle cx="38" cy="28" r="4" fill="#61afef" opacity="0.7"/>
    <circle cx="60" cy="85" r="3" fill="#61afef" opacity="0.5"/>
    <circle cx="15" cy="72" r="3" fill="#61afef" opacity="0.5"/>
  </g>

  <!-- Text: grove -->
  <text x="310" y="105" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="72" font-weight="700" fill="#e2e4e9" letter-spacing="-2">grove</text>

  <!-- Tagline -->
  <text x="314" y="140" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="17" fill="#5c6370">manage local repos &amp; worktrees</text>

  <!-- Decorative branch lines on right -->
  <g transform="translate(700, 55)" opacity="0.15">
    <line x1="0" y1="40" x2="30" y2="20" stroke="#98c379" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="20" x2="60" y2="25" stroke="#98c379" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="20" x2="40" y2="0" stroke="#98c379" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="20" y2="60" stroke="#98c379" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="-15" y2="55" stroke="#98c379" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="25" r="3" fill="#61afef"/>
    <circle cx="40" cy="0" r="3" fill="#61afef"/>
    <circle cx="20" cy="60" r="3" fill="#61afef"/>
    <circle cx="-15" cy="55" r="3" fill="#61afef"/>
  </g>
</svg>
