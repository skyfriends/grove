<svg width="840" height="180" viewBox="0 0 840 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#1f2030"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8d88a"/>
      <stop offset="100%" stop-color="#7cb668"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="840" height="180" rx="12" fill="url(#bg)"/>

  <!-- Stylized tree -->
  <g transform="translate(255, 28)">
    <!-- Trunk -->
    <rect x="28" y="88" width="8" height="52" rx="4" fill="#d4a05a"/>
    <rect x="28" y="88" width="8" height="52" rx="4" fill="#e5c07b" opacity="0.6"/>

    <!-- Canopy layers - clean geometric -->
    <path d="M32 18 L58 72 H6 Z" fill="url(#leaf)" opacity="0.95"/>
    <path d="M32 38 L52 78 H12 Z" fill="#98c379" opacity="0.6"/>

    <!-- Worktree nodes -->
    <circle cx="16" cy="62" r="3.5" fill="#61afef" opacity="0.8"/>
    <circle cx="48" cy="58" r="3.5" fill="#61afef" opacity="0.8"/>
    <circle cx="32" cy="30" r="3.5" fill="#61afef" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="330" y="96" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace" font-size="64" font-weight="700" fill="#e2e4e9" letter-spacing="-1">grove</text>

  <!-- Tagline -->
  <text x="333" y="126" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace" font-size="15" fill="#5c6370" letter-spacing="0.5">manage local repos &amp; worktrees</text>
</svg>
